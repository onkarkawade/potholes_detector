<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pothole Reporter Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <h1>Pothole Reporter Lite</h1>
        <p class="sub">Mobile camera capture with interval shooting, GPS tagging, and local save.</p>

        <form id="reportForm" class="form-grid">
          <div class="full-width camera-panel">
            <video id="cameraFeed" playsinline autoplay muted style="display:none;"></video>
            <input type="file" id="cameraCapture" accept="image/*" capture="environment" style="display:none;" />
            <div class="camera-actions">
              <button type="button" id="captureBtn" class="primary-action">📷 Capture Photo</button>
              <button type="button" id="startCamera" style="display:none;">Open Camera (Desktop)</button>
              <button type="button" id="stopCamera" class="ghost" style="display:none;">Stop Camera</button>
              <button type="button" id="captureNow" style="display:none;">Capture Now</button>
            </div>
          </div>

          <label>
            Image prefix
            <input id="imagePrefix" type="text" value="pothole" required />
          </label>

          <label>
            Detection class
            <select id="detectionClass" required>
              <option value="">Select class</option>
              <option value="pothole">pothole</option>
              <option value="crack">crack</option>
              <option value="debris">debris</option>
              <option value="clear">clear</option>
            </select>
          </label>

          <label>
            Interval
            <select id="captureInterval">
              <option value="3">Every 3 seconds</option>
              <option value="5" selected>Every 5 seconds</option>
              <option value="10">Every 10 seconds</option>
            </select>
          </label>

          <label>
            Latitude
            <input id="latitude" type="number" step="any" placeholder="12.9716" readonly required />
          </label>

          <label>
            Longitude
            <input id="longitude" type="number" step="any" placeholder="77.5946" readonly required />
          </label>

          <button type="button" id="useLocation">Refresh GPS</button>
          <button type="button" id="startAutoCapture">Start Auto Capture</button>
          <button type="button" id="stopAutoCapture" class="danger">Stop Auto Capture</button>

          <div class="full-width status-wrap">
            <p id="statusText">Status: idle</p>
          </div>

          <div id="previewBox" class="preview-box full-width">
            <p>No image captured yet.</p>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="toolbar">
          <h2>Saved Reports</h2>
          <div class="actions">
            <button id="downloadCsv" type="button">Download CSV</button>
            <button id="clearAll" type="button" class="danger">Clear</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Class</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Save</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
