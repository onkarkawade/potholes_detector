<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pothole Reporter Lite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <h1>Pothole Reporter Lite</h1>
        <p class="sub">Capture metadata quickly and export as CSV.</p>

        <form id="reportForm" class="form-grid">
          <label>
            Image name
            <input id="imageName" type="text" placeholder="road_001.jpg" required />
          </label>

          <label>
            Detection class
            <select id="detectionClass" required>
              <option value="">Select class</option>
              <option value="pothole">pothole</option>
              <option value="crack">crack</option>
              <option value="debris">debris</option>
              <option value="clear">clear</option>
            </select>
          </label>

          <label>
            Latitude
            <input id="latitude" type="number" step="any" placeholder="12.9716" required />
          </label>

          <label>
            Longitude
            <input id="longitude" type="number" step="any" placeholder="77.5946" required />
          </label>

          <button type="button" id="useLocation">Use my location</button>
          <button type="submit">Save report</button>
        </form>
      </section>

      <section class="card">
        <div class="toolbar">
          <h2>Saved Reports</h2>
          <div class="actions">
            <button id="downloadCsv" type="button">Download CSV</button>
            <button id="clearAll" type="button" class="danger">Clear</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Image</th>
                <th>Class</th>
                <th>Latitude</th>
                <th>Longitude</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
